<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Add course</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap"
      rel="stylesheet"
    />
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <header class="Add-course-header">
      <h1>Add Course</h1>
    </header>
    <nav>
      <a href="index.html">Home</a>
      <a href="courses.html">My Courses</a>
      <a href="add-course.html" class="active" aria-current="Add course page"
        >Add Course</a
      >
      <a href="contact-us.html">Contact Us</a>
    </nav>
    <main>
      <section class="Add-course-section">
        <div class="Add-course-form">
          <div class="form-items">
            <label for="course-name">Course Name</label>
            <input
              type="text"
              id="course-name"
              placeholder="e.g. Introduction to Computer Science"
            />
            <label for="lecturer">Instructor Name</label>
            <input type="text" id="lecturer" placeholder="e.g. Dr. Ahmed" />
            <label for="credit-hours">Credit Hours</label>
            <input type="number" id="credit-hours" placeholder="e.g. 3" />
            <label for="notes">Notes</label>
            <textarea
              id="notes"
              rows="4"
              placeholder="Any notes about this course"
            ></textarea>
            <button class="submit-btn">Add Course</button>
          </div>
        </div>
      </section>
    </main>
    <footer>
      <p>&copy 2026 Personal Course Organizer</p>
    </footer>
  </body>
</html>
